<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHA Pages</title>
    <link rel="icon" type="image/png" href="./img/favicon.png">


<style>

* {
    box-sizing:border-box; /*garante que as propriedades de padding e borda fiquem dentro das dimensões totais declaradas*/
}

/* Estilização do cabeçalho principal */
header {
    justify-content: center; /* alinha verticalmente */
    align-items: center; /* alinha horizontalmente */
    display: flex; /* organiza automaticamente os elementos */
    background-color: rgb(57, 66, 66); /* define a cor de fundo */
    width: 80%; /* o cabeçalho vai ocupar 100% da largura da div_mestre */
    margin-top: 1.5%; /* a distância do topo da página até o cabeçalho */
    margin-left: 10%; /* a distância da esquerda da página até o cabeçalho */
    margin-right: 10%; /* a distância da direita da página até o cabeçalho */

}

/*Estilização da parte principal do site*/
main{
    width: 80%;
    height: 800px;
    display: flex; /* organiza automaticamente os elementos */ 
    margin-right: 10%; /* a distância da direita da página até o cabeçalho */
    margin-left: 10%; /* a distância da esquerda da página até o cabeçalho */
}

/* Estilização da parte navegável do site (botões) */
nav {
    text-align: center; /* Alinha os textos no centro */
    background-color: rgb(70, 80, 80); /* define a cor de fundo */
    width: 20%; /* o conteúdo vai ocupar 20% da largura do "conteudos_corpo" */
    height: 100%;
    padding: 10px; /* define a distância do conteúdo dentro do "conteúdo" até a borda da div */
}

/* Estilização da caixa principal com o principal conteúdo da página */
article {
    align-items: center;
    background-color: rgb(255, 255, 255); /* define a cor de fundo*/
    height: 100%;
    width: 80%; /* o conteúdo vai ocupar 80% da largura do "conteudos_corpo" */
}

/* Estilização do rodapé */
footer {
    background-color: rgb(62, 62, 68); /* define a cor de fundo*/
    justify-content: center; /* alinha verticalmente */
    align-items: center; /* alinha horizontalmente */
    display: flex; /* organiza automaticamente os elementos */
    width: 80%; /* o cabeçalho vai ocupar 100% da largura da div_mestre */
    margin-right: 10%; /* a distância da direita da página até o cabeçalho */
    margin-left: 10%; /* a distância da esquerda da página até o cabeçalho */
    margin-bottom: 1.5%; /* a distância da parte de baixo da página até o cabeçalho*/
}

/* Nova classe para fazer os e-mails ficarem lado a lado na fileira de cima */
.criadores {
    display: flex; /* organiza os elementos */
    flex-direction: row; /* alinha os elementos lado a lado */
    justify-content: center; /*alinha os elementos no centro*/
    gap: 40px;               /* Dá um espaçamento elegante entre cada contato */
    width: 100%; /*faz a div preencher toda a div rodape*/
    margin-bottom: 15px;     /* Empurra os direitos reservados um pouco para baixo */
}

.criadores2 {
    display:flex; /* organiza dos elementos*/
    flex-direction: column; /* alinha os elementos em coluna */
}

/* Garante que o texto de copyright fique perfeitamente centralizado */
.direitos-reservados {
    text-align: center; /* alinha os textos no centro */ 
    margin: 0; /* deixa os textos dos direitos reservados mais unidos*/
}

/* classe criada para definir padrões gerais de textos*/
.padraotxt{
    color: aliceblue; /* define a cor do texto */
    text-align: center; /* os textos serão alinhados ao centro */
}

.txtrodape{
    margin-right: 15px; /*margem da direita*/
    margin-left: 15px; /*margem da esquerda*/
}
/*classe criada para definir padrões específicos para os botões */
.botoes{
    width: 90%; /*deixam os botoes grandes na coluna de conteudos, sem estar colado a parede, claro*/
    margin-bottom: 8px; /*margem entre botao e parede e entre outros botoes*/
    text-align: center; /*os textos serão alinhados ao centro */
    font-size: 30px; /* o texto de parágrafos terão 30px de tamanho */
    border-radius: 15px; /* adiciona uma borda com arredondamento de 15px */
    border: 2px solid black ; /* Adiciona uma borca com 2px de espessura, sólida e de cor preta */ 
    background-color: rgb(85, 85, 85); /* Define a cor de fundo */
}

img {
    max-width: 100%;
    height: auto;
}

@media (max-width: 768px) {

    header,
    main,
    footer {
        width: 80%;
        margin-left: 10%;
        margin-right: 10%;
    }


    main {
        flex-direction: column;
    }


    nav {
        width: 100%;
        order: 1;
    }


    article {
        width: 100%;
        order: 2;
    }


    .botoes {
        width: 90%;
        font-size: 20px;
    }


    .criadores {
        flex-direction: column;
        gap: 10px;
    }

}
</style>
</head>

</html>
